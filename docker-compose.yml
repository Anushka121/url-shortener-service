version: '3.8'

services:
  cassandra:
    image: cassandra:4.1
    container_name: url-shortener-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: url-shortener-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./src/main/resources/schema.cql:/docker-entrypoint-initdb.d/schema.cql
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES;' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - url-shortener-network

  redis:
    image: redis:7.2-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - url-shortener-network

  url-shortener-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    ports:
      - "8080:8080"
    environment:
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_KEYSPACE_NAME: url_shortener
      SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_BASE_URL: http://localhost:8080
      APP_REDIS_TTL_HOURS: 24
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - url-shortener-network
    volumes:
      - app_logs:/app/logs

volumes:
  cassandra_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

networks:
  url-shortener-network:
    driver: bridge
